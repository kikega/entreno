{% extends 'base.html' %}
{% load static %}

{% block title %}Contraseña Restablecida - EntrenoPro{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-lg border border-gray-100 text-center">
        <div class="flex justify-center">
            <div class="h-12 w-12 bg-green-100 rounded-full flex items-center justify-center text-accent">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
        </div>
        <div>
            <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900">
                ¡Contraseña Restablecida!
            </h2>
            <p class="mt-4 text-sm text-gray-600">
                Tu contraseña ha sido actualizada correctamente. Ya puedes iniciar sesión con tus nuevas credenciales.
            </p>
        </div>
        <div class="mt-6">
            <a href="{% url 'users:login' %}" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-primary hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors">
                Iniciar Sesión
            </a>
        </div>
    </div>
</div>
{% endblock %}
